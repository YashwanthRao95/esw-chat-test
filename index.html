<!DOCTYPE html>
<html>
<head>
  <style>
    /* Overlay that blocks the chat input area inside the iframe */
    #esw-input-blocker {
      display: none;
      position: fixed;
      bottom: 0;
      right: 20px;
      width: 344px;        /* Match your ESW chat window width */
      height: 60px;        /* Match the height of the input bar */
      background: rgba(255, 255, 255, 0.6);
      z-index: 999999;
      cursor: not-allowed;
      backdrop-filter: blur(1px);
      pointer-events: all;
    }

    #esw-input-blocker::after {
      content: '⏳ Connecting to assistant...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 12px;
      color: #555;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <!-- Your page content -->

  <!-- Overlay div placed OVER the iframe's input area -->
  <div id="esw-input-blocker"></div>

  <!-- 1. Salesforce ESW Snippet -->
  <script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00DgL000008tDT6',
				'ADP_Chat',
				'https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559',
				{
					scrt2URL: 'https://orgfarm-fdf9c9915e-dev-ed.develop.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

  <!-- 2. Bot detection + overlay control -->
  <script>
(function () {

  const blocker = document.getElementById('esw-input-blocker');

  function showBlocker() {
    blocker.style.display = 'block';
    console.log('[ESW] ✅ Blocker ON');
  }

  function hideBlocker() {
    blocker.style.display = 'none';
    console.log('[ESW] ✅ Blocker OFF — bot ready');
  }

  window.addEventListener('onEmbeddedMessagingReady', () => {
    console.log('[ESW] Messaging Ready — registering hooks...');

    // Fires when user opens/maximizes the chat window
    window.addEventListener('onEmbeddedMessagingWindowMaximized', () => {
      console.log('[ESW] 🪟 Chat window opened');
      showBlocker();

      // Safety net — force remove blocker after 12 seconds
      setTimeout(() => {
        hideBlocker();
        console.warn('[ESW] ⏰ Safety timeout — blocker removed');
      }, 12000);
    });

    // Fires when bot/agent sends first message — this is your trigger
    window.addEventListener('onEmbeddedMessagingNewMessage', (e) => {
      console.log('[ESW] 💬 New message received:', e.detail);
      hideBlocker();
    });

  });

})();
</script>

</body>
</html>
