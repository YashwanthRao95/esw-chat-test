<!DOCTYPE html>
<html>
<head>
  <style>
    /* Overlay that blocks the chat input area inside the iframe */
    #esw-input-blocker {
      display: none;
      position: fixed;
      bottom: 0;
      right: 20px;
      width: 344px;        /* Match your ESW chat window width */
      height: 60px;        /* Match the height of the input bar */
      background: rgba(255, 255, 255, 0.6);
      z-index: 999999;
      cursor: not-allowed;
      backdrop-filter: blur(1px);
      pointer-events: all;
    }

    #esw-input-blocker::after {
      content: '⏳ Connecting to assistant...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 12px;
      color: #555;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <!-- Your page content -->

  <!-- Overlay div placed OVER the iframe's input area -->
  <div id="esw-input-blocker"></div>

  <!-- 1. Salesforce ESW Snippet -->
  <script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00DgL000008tDT6',
				'ADP_Chat',
				'https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559',
				{
					scrt2URL: 'https://orgfarm-fdf9c9915e-dev-ed.develop.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

  <!-- 2. Bot detection + overlay control -->
  <script>
(function () {

  const blocker = document.getElementById('esw-input-blocker');

  function showBlocker() {
    blocker.style.display = 'block';
    console.log('[ESW] ✅ Blocker ON');
  }

  function hideBlocker() {
    blocker.style.display = 'none';
    console.log('[ESW] ✅ Blocker OFF — bot ready');
  }

  // ── Wait for MIAW to be fully ready first ──
  window.addEventListener('onEmbeddedMessagingReady', () => {
    console.log('[ESW] Messaging Ready — registering hooks...');

    // ── Hook 1: Fires when the chat WINDOW OPENS ──
    embeddedservice_bootstrap.utilAPI.launchChat();  // only if programmatic launch

    // ── Hook 2: Fires when chat window is opened by user ──
    window.addEventListener('onEmbeddedMessagingWindowMaximized', () => {
      console.log('[ESW] 🪟 Chat window opened');
      showBlocker();
      waitForBotMessage();

      // Safety net
      setTimeout(() => {
        hideBlocker();
        console.warn('[ESW] ⏰ Safety timeout — blocker removed');
      }, 12000);
    });

    // ── Hook 3: Fires when a new message arrives ──
    window.addEventListener('onEmbeddedMessagingNewMessage', (e) => {
      console.log('[ESW] 💬 New message event:', e.detail);

      // First message = bot greeting = safe to enable input
      hideBlocker();
    });

  });

  // ── Observe iframe for bot message as fallback ──
  function waitForBotMessage() {
    console.log('[ESW] ⏳ Looking for ESW iframe...');

    const interval = setInterval(() => {
      // Log ALL iframes to help identify the right one
      const allIframes = document.querySelectorAll('iframe');
      console.log('[ESW] iframes found:', allIframes.length);
      allIframes.forEach((f, i) => {
        console.log(`  iframe[${i}]:`, f.title, f.className, f.name);
      });

      const iframe =
        document.querySelector('iframe[title="Chat"]') ||
        document.querySelector('iframe[title="Messaging Window"]') ||
        document.querySelector('iframe[title="Messaging"]') ||
        document.querySelector('iframe[name*="esw"]') ||
        document.querySelector('.embeddedServiceSidebar iframe') ||
        allIframes[0]; // last resort — first iframe on page

      if (iframe) {
        clearInterval(interval);
        console.log('[ESW] ✅ iframe found:', iframe.title || iframe.name);

        try {
          const body = iframe.contentDocument?.body;
          if (!body) {
            console.warn('[ESW] ⚠️ Cannot access iframe body');
            return;
          }

          const observer = new MutationObserver((mutations) => {
            for (const mutation of mutations) {
              for (const node of mutation.addedNodes) {
                if (node.nodeType !== 1) continue;
                console.log('[ESW] 🧩 Node added in iframe:', node.className);
              }
            }
          });

          observer.observe(body, { childList: true, subtree: true });

        } catch (err) {
          console.error('[ESW] ❌ iframe access error:', err);
        }
      }
    }, 500);
  }

})();
</script>

</body>
</html>
