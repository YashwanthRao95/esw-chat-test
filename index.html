<!DOCTYPE html>
<html>
<head>
  <style>
	  .embeddedMessagingFrame,
	  .embeddedMessagingConversationButtonWrapper {
		z-index: 1200;
	  }
		@media(min-width: 769px){
			.embeddedMessagingFrame[class~="isMaximized"] {
			bottom: 70px !important;
			}

			#esw-input-blocker {
		      display: none;
		      position: fixed;
		      bottom: 0;
		      right: 20px;
		      width: 450px;        /* Match your ESW chat window width */
		      height: 120px;        /* Match the height of the input bar */
		      background: rgba(255, 255, 255, 0.6);
		      z-index: 999999;
		      cursor: not-allowed;
		      backdrop-filter: blur(1px);
		      pointer-events: all;
		      bottom: 70px !important;
		    }
		}
	  
	  .embedded-messaging > .embeddedMessagingFrame[class~="isMinimized"] {
	    height: 56px;
	    width: 56px;
	    box-shadow: 0 0 8px 4px rgba(0, 0, 0, 0.16);
	  }
	
	  @media (max-width: 870px) {
	    /* mobile */
	    .embedded-messaging
	      > .embeddedMessagingFrame[class~="isMinimized"]:not(.show),
	    .embeddedMessagingConversationButtonWrapper
	      .embeddedMessagingConversationButton:not(.show) {
		      visibility: hidden;
		      height: 0;
		      width: 0;
		      opacity: 0;
	      }
	   /* Overlay that blocks the chat input area inside the iframe */
	    #esw-input-blocker {
	      display: none;
	      position: fixed;
	      bottom: 0;
	      right: 20px;
	      width: 100%;        /* Match your ESW chat window width */
	      height: 120px;        /* Match the height of the input bar */
	      background: rgba(255, 255, 255, 0.6);
	      z-index: 999999;
	      cursor: not-allowed;
	      backdrop-filter: blur(1px);
	      pointer-events: all;
	    }  
	  }
	  
    #esw-input-blocker::after {
      content: 'Connecting to ADP Chat...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 12px;
      color: #555;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <!-- Your page content -->

  <!-- Overlay div placed OVER the iframe's input area -->
  <div id="esw-input-blocker"></div>

  <!-- 1. Salesforce ESW Snippet -->
  <script type='text/javascript' defer>
	let popupInitialized = false;
  	const isMobileBP = window.innerWidth < 870;
	console.log('IsMobileBp ---', isMobileBP);
	  
	async function initEmbeddedMessaging() {
		try{
			await initChat();
			//setTimeout(initUI, 1500);
		} catch(err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};

	const initChat = async() => {
		const settings = embeddedservice_bootstrap.settings;
		settings.language = 'en_US'; // For example, enter 'en' or 'en-US'
		settings.chatButtonPosition = isMobileBP ? "5%,5%" : "100px,100px";

		if(isMobileBP) {
			settings.hideChatButtonOnLoad = true;
		}
		
		try {
			embeddedservice_bootstrap.init(
				'00DgL000008tDT6',
				'ADP_Chat',
				'https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559',
				{
					scrt2URL: 'https://orgfarm-fdf9c9915e-dev-ed.develop.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://orgfarm-fdf9c9915e-dev-ed.develop.my.site.com/ESWADPChat1759351536559/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

  <!-- 2. Bot detection + overlay control -->
  <script>
(function () {

  const blocker = document.getElementById('esw-input-blocker');

  function showBlocker() {
    blocker.style.display = 'block';
  }

  function hideBlocker() {
    blocker.style.display = 'none';
  }

  window.addEventListener('onEmbeddedMessagingReady', () => {
    // Fires when user opens/maximizes the chat window
    window.addEventListener('onEmbeddedMessagingWindowMaximized', () => {
      showBlocker();

      // Safety net — force remove blocker after 12 seconds
      setTimeout(() => {
        hideBlocker();
      }, 5000);
    });

    // Fires when bot/agent sends first message — this is your trigger
    window.addEventListener('onEmbeddedMessagingNewMessage', (e) => {
      hideBlocker();
    });
  });
})();
</script>

</body>
</html>
