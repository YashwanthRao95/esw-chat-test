<!DOCTYPE html>
<html>
<head>
  <style>
    /* Overlay that blocks the chat input area inside the iframe */
    #esw-input-blocker {
      display: none;
      position: fixed;
      bottom: 0;
      right: 20px;
      width: 344px;        /* Match your ESW chat window width */
      height: 60px;        /* Match the height of the input bar */
      background: rgba(255, 255, 255, 0.6);
      z-index: 999999;
      cursor: not-allowed;
      backdrop-filter: blur(1px);
      pointer-events: all;
    }

    #esw-input-blocker::after {
      content: '⏳ Connecting to assistant...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 12px;
      color: #555;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <!-- Your page content -->

  <!-- Overlay div placed OVER the iframe's input area -->
  <div id="esw-input-blocker"></div>

  <!-- 1. Salesforce ESW Snippet -->
  <script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00DTI000005uTR3',
				'ADP_Assist',
				'https://myadp--fit2.sandbox.my.site.com/ESWADPAssist1761568078940',
				{
					scrt2URL: 'https://myadp--fit2.sandbox.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://myadp--fit2.sandbox.my.site.com/ESWADPAssist1761568078940/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

  <!-- 2. Bot detection + overlay control -->
  <script>
    (function () {

      const blocker = document.getElementById('esw-input-blocker');

      function showBlocker() {
        blocker.style.display = 'block';
        console.log('[ESW] Blocker ON — waiting for Einstein bot...');
      }

      function hideBlocker() {
        blocker.style.display = 'none';
        console.log('[ESW] Blocker OFF — Einstein bot is ready.');
      }

      // ── Detect bot's first message via MutationObserver on the iframe body ──
      function observeIframeForBotMessage() {
        // Find the ESW iframe — it loads slightly after chat opens
        const iframeCheckInterval = setInterval(() => {
          const iframe =
            document.querySelector('iframe.embeddedServiceSidebarMinimizedDefaultUI') ||
            document.querySelector('iframe[name*="esw"]') ||
            document.querySelector('.embeddedServiceSidebar iframe') ||
            document.querySelector('iframe[title*="Chat"]') ||
            document.querySelector('iframe[title*="Messaging"]');

          if (iframe && iframe.contentDocument && iframe.contentDocument.body) {
            clearInterval(iframeCheckInterval);
            console.log('[ESW] iframe found — observing for bot message...');

            const iframeBody = iframe.contentDocument.body;

            const observer = new MutationObserver((mutations) => {
              for (const mutation of mutations) {
                for (const node of mutation.addedNodes) {
                  if (node.nodeType !== 1) continue;

                  // Check if this is a bot/agent message bubble
                  const isBotMessage =
                    node.classList?.contains('agent-message') ||
                    node.classList?.contains('chasitorText') ||
                    node.querySelector?.('.agent-message') ||
                    node.querySelector?.('.chasitorText') ||
                    node.querySelector?.('[class*="agent"]') ||
                    node.querySelector?.('[class*="bot"]') ||
                    node.querySelector?.('[class*="message"]');

                  if (isBotMessage) {
                    hideBlocker();
                    observer.disconnect();
                    return;
                  }
                }
              }
            });

            observer.observe(iframeBody, {
              childList: true,
              subtree: true,
            });
          }
        }, 500); // Check every 500ms until iframe is found
      }

      // ── Show blocker when chat window opens ──
      window.addEventListener('onEmbeddedMessagingReady', () => {
        console.log('[ESW] Messaging Ready');
      });

      // Covers both classic ESW and MIAW chat button click
      document.addEventListener('click', (e) => {
        const target = e.target;
        const isLaunchButton =
          target.closest('.embeddedServiceHelpButton') ||
          target.closest('.helpButton') ||
          target.closest('.fab') ||
          target.closest('[class*="launchButton"]') ||
          target.closest('[class*="helpButton"]');

        if (isLaunchButton) {
          showBlocker();
          observeIframeForBotMessage();
        }
      });

      // ── Safety net: force remove blocker after 12 seconds ──
      document.addEventListener('click', (e) => {
        const isLaunchButton =
          e.target.closest('.embeddedServiceHelpButton') ||
          e.target.closest('.helpButton');

        if (isLaunchButton) {
          setTimeout(() => {
            hideBlocker();
            console.warn('[ESW] Safety timeout — blocker force-removed.');
          }, 12000);
        }
      });

    })();
  </script>

</body>
</html>
